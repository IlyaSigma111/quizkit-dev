<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Тематические викторины — QuizKit</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🦉</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#08080e;color:#ededef;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
::selection{background:rgba(120,80,255,.35)}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;background:rgba(8,8,14,.75);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:#ededef}
.nav-logo svg{width:22px;height:22px}

.hero{text-align:center;padding:120px 24px 40px}
.hero h1{font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-1px;margin-bottom:10px}
.hero p{color:#686878;font-size:15px;max-width:500px;margin:0 auto}

.section-title{margin:0 auto;max-width:1000px;padding:32px 24px 16px;font-size:18px;font-weight:600;color:#ededef}

.quiz-grid{max-width:1000px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.quiz-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:24px;transition:all .25s;display:flex;flex-direction:column}
.quiz-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);transform:translateY(-4px)}
.quiz-card .icon{font-size:32px;margin-bottom:10px}
.quiz-card .cat-badge{font-size:11px;color:#a080ff;background:rgba(120,80,255,.1);padding:2px 10px;border-radius:100px;display:inline-block;margin-bottom:8px;width:fit-content}
.quiz-card h3{font-size:16px;font-weight:600;margin-bottom:4px}
.quiz-card .desc{color:#686878;font-size:13px;margin-bottom:12px;flex:1;line-height:1.5}
.quiz-card .meta{display:flex;gap:12px;font-size:12px;color:#585868;margin-bottom:14px}
.quiz-card .meta span{display:flex;align-items:center;gap:4px}
.quiz-card .btns{display:flex;gap:8px}
.quiz-card .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:inherit;flex:1}
.quiz-card .btn-primary{background:#7850ff;color:#fff}
.quiz-card .btn-primary:hover{background:#6840ef;transform:translateY(-1px);box-shadow:0 4px 16px rgba(120,80,255,.25)}
.quiz-card .btn-secondary{background:rgba(255,255,255,.06);color:#ededef;border:1px solid rgba(255,255,255,.08)}
.quiz-card .btn-secondary:hover{background:rgba(255,255,255,.1);transform:translateY(-1px)}

footer{text-align:center;padding:32px 24px;color:#585868;font-size:12px;border-top:1px solid rgba(255,255,255,.05)}
footer a{color:#686878}
footer a:hover{color:#ededef}

.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#12121c;border:1px solid rgba(255,255,255,.08);border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;position:relative}
.modal-close{position:sticky;top:0;float:right;background:none;border:none;color:#686878;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-close:hover{color:#ededef;background:rgba(255,255,255,.05)}
.modal h2{font-size:20px;font-weight:700;margin-bottom:6px;padding-right:32px}
.modal .modal-sub{color:#686878;font-size:13px;margin-bottom:24px}
.q-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:12px}
.q-item h4{font-size:14px;font-weight:500;margin-bottom:12px;line-height:1.5}
.q-opts{display:flex;flex-direction:column;gap:6px}
.q-opts label{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.03);font-size:13px;cursor:default;border:1px solid transparent;transition:all .15s}
.q-opts input[type="radio"]{appearance:none;width:14px;height:14px;border:2px solid #585868;border-radius:50%;flex-shrink:0;position:relative}
.q-opts input[type="radio"]::after{content:'';position:absolute;inset:3px;border-radius:50%;background:transparent;transition:background .15s}
.q-opts .correct{border-color:rgba(80,200,120,.3);background:rgba(80,200,120,.08)}
.q-opts .correct input[type="radio"]{border-color:#50c878}
.q-opts .correct input[type="radio"]::after{background:#50c878}
.q-opts .correct .check-label{color:#50c878;font-size:11px;margin-left:auto}

@media(max-width:600px){
  .modal{padding:20px 16px}
  .quiz-card .btns{flex-direction:column}
}
</style>
</head>
<body>

<nav>
<div class="nav-inner">
  <a href="https://ilyasigma111.github.io/quizkit/" class="nav-logo">
    <svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="48" stroke="currentColor" stroke-width="2" opacity=".15"/><path d="M50 22c-8 0-14 6-14 14v6h-4c-3 0-6 3-6 6v24c0 3 3 6 6 6h36c3 0 6-3 6-6V48c0-3-3-6-6-6h-4v-6c0-8-6-14-14-14zm-8 20V36a8 8 0 1116 0v6H42zm-6 10h28v20H36V52z" fill="currentColor"/><circle cx="50" cy="60" r="4" fill="currentColor" opacity=".4"/></svg>
    QuizKit
  </a>
  <a href="https://ilyasigma111.github.io/quizkit/" style="font-size:13px;color:#787888">← На главную</a>
</div>
</nav>

<div class="hero">
  <h1>📚 Тематические викторины</h1>
  <p>Подборки вопросов про праздники России — скачивай или смотри прямо на сайте</p>
</div>

<div id="content"></div>

<footer>
  <a href="https://github.com/IlyaSigma111/quizkit">GitHub</a> &middot; 
  <a href="https://github.com/IlyaSigma111/quizkit/issues">Предложить тему</a>
</footer>

<div class="modal-overlay" id="modal">
<div class="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <h2 id="modalTitle"></h2>
  <div class="modal-sub" id="modalSub"></div>
  <div id="modalBody"></div>
</div>
</div>

<script>
const CATS = {
  '❄️': 'Зимние праздники',
  '🌸': 'Весенние праздники',
  '☀️': 'Летние праздники',
  '🍂': 'Осенние праздники'
}

const QUIZZES = [
  { file:'new-year.json', icon:'🎄', cat:'❄️', title:'Новый год', desc:'История ёлки, оливье и главный фильм страны.', questions:5, time:'10-15с' },
  { file:'student-day.json', icon:'📖', cat:'❄️', title:'День студента (Татьянин день)', desc:'Московский университет, Ломоносов и студенческие традиции.', questions:5, time:'10-15с' },
  { file:'valentines-day.json', icon:'💝', cat:'❄️', title:'День святого Валентина', desc:'Кто такой Валентин, валентинки и традиции со всего мира.', questions:5, time:'10-15с' },
  { file:'defender-day.json', icon:'🎖️', cat:'❄️', title:'День защитника Отечества', desc:'Красная армия, история праздника и военные традиции.', questions:5, time:'10-15с' },

  { file:'womens-day.json', icon:'🌷', cat:'🌸', title:'8 Марта', desc:'Клара Цеткин, тюльпаны и революция.', questions:5, time:'10-15с' },
  { file:'cosmonautics-day.json', icon:'🚀', cat:'🌸', title:'День космонавтики', desc:'Гагарин, Восток-1 и главный конструктор Королёв.', questions:5, time:'10-15с' },
  { file:'labor-day.json', icon:'🌿', cat:'🌸', title:'Праздник Весны и Труда', desc:'История Первомая, СССР и чикагские рабочие.', questions:5, time:'10-15с' },
  { file:'victory-day.json', icon:'🏅', cat:'🌸', title:'День Победы', desc:'Великая Отечественная, Знамя Победы и парады.', questions:5, time:'10-15с' },

  { file:'russia-day.json', icon:'🇷🇺', cat:'☀️', title:'День России', desc:'Суверенитет, президенты и государственные символы.', questions:5, time:'10-15с' },
  { file:'family-day.json', icon:'💛', cat:'☀️', title:'День семьи, любви и верности', desc:'Пётр и Феврония, ромашки и семейные ценности.', questions:5, time:'10-15с' },

  { file:'knowledge-day.json', icon:'📚', cat:'🍂', title:'День знаний', desc:'Первое сентября, линейки и традиции первоклассников.', questions:5, time:'10-15с' },
  { file:'teachers-day.json', icon:'🍎', cat:'🍂', title:'День учителя', desc:'Педагогика, цветы и мировые традиции.', questions:5, time:'10-15с' },
  { file:'unity-day.json', icon:'🤝', cat:'🍂', title:'День народного единства', desc:'Минин и Пожарский, ополчение и история 4 ноября.', questions:5, time:'10-15с' },
]

const CONFIG_URL = 'https://raw.githubusercontent.com/IlyaSigma111/quizkit/master/quizzes/'

function openModal(q) {
  const overlay = document.getElementById('modal')
  document.getElementById('modalTitle').textContent = q.icon + ' ' + q.title
  document.getElementById('modalSub').textContent = q.desc
  const body = document.getElementById('modalBody')
  body.innerHTML = '<div style="text-align:center;padding:24px;color:#585868">Загрузка вопросов...</div>'
  overlay.classList.add('open')
  document.body.style.overflow = 'hidden'

  fetch(CONFIG_URL + q.file)
    .then(r => r.json())
    .then(data => {
      let html = ''
      data.questions.forEach((item, i) => {
        html += `<div class="q-item"><h4>${i + 1}. ${item.question}</h4><div class="q-opts">`
        item.answers.forEach((a, j) => {
          const isCorrect = j === item.correct
          const cls = isCorrect ? 'correct' : ''
          html += `<label class="${cls}"><input type="radio" disabled${isCorrect ? ' checked' : ''}><span>${a}</span>${isCorrect ? '<span class="check-label">✓ Правильный ответ</span>' : ''}</label>`
        })
        html += '</div></div>'
      })
      body.innerHTML = html
    })
    .catch(() => {
      body.innerHTML = '<div style="text-align:center;padding:24px;color:#ff6060">Ошибка загрузки 😔</div>'
    })
}

function closeModal() {
  document.getElementById('modal').classList.remove('open')
  document.body.style.overflow = ''
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal()
})

function render() {
  const cats = {}
  QUIZZES.forEach(q => {
    if (!cats[q.cat]) cats[q.cat] = []
    cats[q.cat].push(q)
  })

  const container = document.getElementById('content')
  container.innerHTML = ''

  Object.entries(CATS).forEach(([emoji, label]) => {
    const items = cats[emoji]
    if (!items) return

    const section = document.createElement('div')
    section.innerHTML = `<div class="section-title">${emoji} ${label}</div>`
    const grid = document.createElement('div')
    grid.className = 'quiz-grid'

    items.forEach(q => {
      const url = CONFIG_URL + q.file
      const card = document.createElement('div')
      card.className = 'quiz-card'
      card.innerHTML = `
        <div class="icon">${q.icon}</div>
        <span class="cat-badge">${emoji} ${CATS[emoji]}</span>
        <h3>${q.title}</h3>
        <div class="desc">${q.desc}</div>
        <div class="meta">
          <span>📝 ${q.questions} вопросов</span>
          <span>⏱ ${q.time}</span>
        </div>
        <div class="btns">
          <button class="btn btn-secondary" onclick='openModal(${JSON.stringify(q).replace(/'/g,"&#39;")})'>👁 Посмотреть</button>
          <a href="${url}" download="${q.file}" class="btn btn-primary">⬇ Скачать</a>
        </div>
      `
      grid.appendChild(card)
    })

    section.appendChild(grid)
    container.appendChild(section)
  })
}

render()
</script>
</body>
</html>
