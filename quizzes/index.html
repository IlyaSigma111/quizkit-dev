const CONFIG_URL = 'https://raw.githubusercontent.com/IlyaSigma111/quizkit/master/quizzes/'

function openModal(q) {
  const overlay = document.getElementById('modal')
  document.getElementById('modalTitle').textContent = q.icon + ' ' + q.title
  document.getElementById('modalSub').textContent = q.desc
  const body = document.getElementById('modalBody')
  body.innerHTML = '<div style="text-align:center;padding:24px;color:#585868">╨Ч╨░╨│╤А╤Г╨╖╨║╨░ ╨▓╨╛╨┐╤А╨╛╤Б╨╛╨▓...</div>'
  overlay.classList.add('open')
  document.body.style.overflow = 'hidden'

  fetch(CONFIG_URL + q.file)
    .then(r => r.json())
    .then(data => {
      let html = ''
      data.questions.forEach((item, i) => {
        html += `<div class="q-item"><h4>${i + 1}. ${item.question}</h4><div class="q-opts">`
        item.answers.forEach((a, j) => {
          const isCorrect = j === item.correct
          const cls = isCorrect ? 'correct' : ''
          html += `<label class="${cls}"><input type="radio" disabled${isCorrect ? ' checked' : ''}><span>${a}</span>${isCorrect ? '<span class="check-label">тЬУ ╨Я╤А╨░╨▓╨╕╨╗╤М╨╜╤Л╨╣ ╨╛╤В╨▓╨╡╤В</span>' : ''}</label>`
        })
        html += '</div></div>'
      })
      body.innerHTML = html
    })
    .catch(() => {
      body.innerHTML = '<div style="text-align:center;padding:24px;color:#ff6060">╨Ю╤И╨╕╨▒╨║╨░ ╨╖╨░╨│╤А╤Г╨╖╨║╨╕ ЁЯШФ</div>'
    })
}

function closeModal() {
  document.getElementById('modal').classList.remove('open')
  document.body.style.overflow = ''
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal()
})

function render() {
  const cats = {}
  QUIZZES.forEach(q => {
    if (!cats[q.cat]) cats[q.cat] = []
    cats[q.cat].push(q)
  })

  const container = document.getElementById('content')
  container.innerHTML = ''

  Object.entries(CATS).forEach(([emoji, label]) => {
    const items = cats[emoji]
    if (!items) return

    const section = document.createElement('div')
    section.innerHTML = `<div class="section-title">${emoji} ${label}</div>`
    const grid = document.createElement('div')
    grid.className = 'quiz-grid'

    items.forEach(q => {
      const card = document.createElement('div')
      card.className = 'quiz-card'
      card.innerHTML = `
        <div class="icon">${q.icon}</div>
        <span class="cat-badge">${emoji} ${CATS[emoji]}</span>
        <h3>${q.title}</h3>
        <div class="desc">${q.desc}</div>
        <div class="meta">
          <span>ЁЯУЭ ${q.questions} ╨▓╨╛╨┐╤А╨╛╤Б╨╛╨▓</span>
        </div>
        <div class="btns">
          <button class="btn btn-secondary" onclick='openModal(${JSON.stringify(q).replace(/'/g,"&#39;")})'>ЁЯСБ ╨Я╨╛╤Б╨╝╨╛╤В╤А╨╡╤В╤М</button>
          <a href="${q.file}" download="${q.file}" class="btn btn-primary">тмЗ ╨б╨║╨░╤З╨░╤В╤М</a>
        </div>
      `
      grid.appendChild(card)
    })

    section.appendChild(grid)
    container.appendChild(section)
  })
}

render()
