<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ИльЯкласс</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{--radius:14px;--shadow:0 8px 32px rgba(0,0,0,.3)}

/* ─── Styles ─── */
.style-editorial{--bg:#ffffff;--bg-alt:#f7f8fb;--bg-card:#ffffff;--bg-card-solid:#ffffff;--bg-input:#f7f8fb;--text:#13151b;--text-secondary:#525769;--primary:#000000;--primary-hover:#222;--primary-glow:rgba(0,0,0,.08);--border:#e4e6ee;--radius:64px;--shadow:0 1px 3px rgba(12,41,126,.07)}
.style-editorial.dark{--bg:#13151b;--bg-alt:#1a1c24;--bg-card:#1a1c24;--bg-card-solid:#13151b;--bg-input:#22242e;--text:#e8e8f0;--text-secondary:#8888b0;--primary:#ffffff;--primary-hover:#ddd;--primary-glow:rgba(255,255,255,.08);--border:#2a2c36;--shadow:0 8px 32px rgba(0,0,0,.3)}
.style-midnight{--bg:#080812;--bg-alt:#0e0e1c;--bg-card:rgba(255,255,255,.04);--bg-card-solid:rgba(8,8,18,.9);--bg-input:rgba(255,255,255,.06);--text:#e8e8f0;--text-secondary:#a0a0c0;--primary:#6366F1;--primary-hover:#5558e6;--primary-glow:rgba(99,102,241,.2);--border:rgba(255,255,255,.08);--radius:14px;--shadow:0 8px 32px rgba(0,0,0,.3)}
.style-midnight.dark{--bg:#04040a;--bg-alt:#080812;--bg-card:rgba(255,255,255,.02);--bg-card-solid:rgba(4,4,10,.95);--bg-input:rgba(255,255,255,.04);--border:rgba(255,255,255,.04)}
.style-brutalist{--bg:#e8e4de;--bg-alt:#d8d4ce;--bg-card:#e8e4de;--bg-card-solid:#e8e4de;--bg-input:#d8d4ce;--text:#1a1a1a;--text-secondary:#444;--primary:#ff3300;--primary-hover:#cc2900;--primary-glow:rgba(255,51,0,.15);--border:#1a1a1a;--radius:0px;--shadow:6px 6px 0px #1a1a1a}
.style-brutalist.dark{--bg:#1a1a1a;--bg-alt:#222;--bg-card:#1a1a1a;--bg-card-solid:#1a1a1a;--bg-input:#2a2a2a;--text:#e8e4de;--text-secondary:#999;--primary:#ff3300;--primary-hover:#ff4422;--primary-glow:rgba(255,51,0,.2);--border:#e8e4de;--shadow:6px 6px 0px #e8e4de}
.style-neon{--bg:#0a0a0f;--bg-alt:#111118;--bg-card:#111118;--bg-card-solid:#0a0a0f;--bg-input:#111118;--text:#f0f0f5;--text-secondary:#8888aa;--primary:#00ff88;--primary-hover:#00cc6a;--primary-glow:rgba(0,255,136,.15);--border:#222233;--radius:12px;--shadow:0 0 20px rgba(0,255,136,.08)}
.style-neon.dark{--bg:#050508;--bg-alt:#08080e;--bg-card:#08080e;--bg-input:#08080e;--border:#14141e}
.style-paper{--bg:#faf6f1;--bg-alt:#f3ede5;--bg-card:#ffffff;--bg-card-solid:#ffffff;--bg-input:#f3ede5;--text:#2c2416;--text-secondary:#6b5d4d;--primary:#c05621;--primary-hover:#a0471a;--primary-glow:rgba(192,86,33,.1);--border:#e0d5c8;--radius:12px;--shadow:0 2px 12px rgba(44,36,22,.08)}
.style-paper.dark{--bg:#2c2416;--bg-alt:#3a3020;--bg-card:#3a3020;--bg-card-solid:#2c2416;--bg-input:#4a3f2e;--text:#faf6f1;--text-secondary:#b0a090;--primary:#e88d4a;--primary-hover:#c05621;--primary-glow:rgba(232,141,74,.15);--border:#5a4f3e;--shadow:0 8px 32px rgba(0,0,0,.3)}

body{font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;background-attachment:fixed}
.player-app{width:100%;max-width:420px;min-height:100dvh;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.screen{display:none;width:100%}
.screen.active{display:flex;flex-direction:column;align-items:center;gap:16px;animation:screenIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes screenIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.card{width:100%;padding:28px 24px;background:var(--bg-card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:16px}

h2{font-size:22px;text-align:center;font-weight:700;letter-spacing:-.2px}
p{font-size:14px;line-height:1.5;color:var(--text-secondary);text-align:center}

.input-group{width:100%;display:flex;flex-direction:column;gap:6px}
.input-group label{font-size:12px;color:var(--text-secondary);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.input-group input{width:100%;padding:14px 18px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;text-align:center;letter-spacing:2px;transition:all .2s;font-family:inherit}
.input-group input:focus{outline:none;border-color:var(--primary)!important;box-shadow:0 0 0 3px var(--primary-glow)}

.btn{width:100%;padding:14px 24px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.2px;font-family:inherit;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 16px var(--primary-glow)}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 6px 24px var(--primary-glow)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.error{color:var(--danger);font-size:13px;text-align:center;background:rgba(231,76,60,.1);padding:10px 14px;border-radius:8px;width:100%;display:none;border:1px solid rgba(231,76,60,.2)}
.error.show{display:block}

.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ─── Join ─── */
.join-logo{font-size:48px;margin-bottom:2px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.join-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:-4px}

/* ─── Lobby ─── */
.lobby-count{font-size:40px;font-weight:900;color:var(--primary);line-height:1}
.lobby-label{font-size:12px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.lobby-players{font-size:13px;color:var(--text-secondary);text-align:center;line-height:1.6;margin-top:2px}
.lobby-waiting{font-size:14px;color:var(--text-secondary);text-align:center}

/* ─── Countdown ─── */
.countdown-number{font-size:88px;font-weight:900;color:var(--primary);animation:countPulse .6s ease;text-shadow:0 0 40px var(--primary-glow);line-height:1}
@keyframes countPulse{0%{transform:scale(1.6);opacity:0}40%{opacity:1}to{transform:scale(1)}}

/* ─── Question ─── */
.q-progress{font-size:12px;color:var(--text-secondary);font-weight:600;align-self:flex-start;text-transform:uppercase;letter-spacing:.4px}
.q-text{font-size:20px;text-align:center;line-height:1.35;font-weight:700;letter-spacing:-.2px}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-top:4px}
.answer-btn{padding:18px 12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s;min-height:88px;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.answer-btn:active{transform:scale(.94)}
.answer-btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.answer-btn.correct{opacity:1!important;box-shadow:0 0 0 3px var(--success),0 0 20px var(--success-glow)!important}
.answer-btn.wrong{opacity:1!important;box-shadow:0 0 0 3px var(--danger),0 0 16px rgba(231,76,60,.3)!important}
.answer-btn .shape{font-size:24px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.answer-btn .text{font-size:13px;text-align:center;line-height:1.3}
.timer-bar{width:100%;height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden}
.timer-fill{height:100%;background:var(--primary);transition:width 1s linear;border-radius:3px;box-shadow:0 0 8px var(--primary-glow)}

/* ─── Result ─── */
.result-icon{font-size:60px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.3))}
.result-points{font-size:36px;font-weight:800;color:var(--success);text-shadow:0 0 20px var(--success-glow)}
.result-points.wrong{color:var(--danger);text-shadow:0 0 20px rgba(231,76,60,.3)}

/* ─── Round Results ─── */
.round-results-title{font-size:16px;font-weight:700;color:var(--success);text-align:center}
.histogram-bar-track{flex:1;height:14px;background:var(--bg-input);border-radius:7px;overflow:hidden}
.histogram-bar-fill{height:100%;border-radius:7px;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:4px}

/* ─── Complete ─── */
.complete-icon{font-size:64px}
.complete-score{font-size:48px;font-weight:900;color:var(--primary);line-height:1;text-shadow:0 0 30px var(--primary-glow)}

/* ─── Leaderboard ─── */
.lb-item{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--bg-input);backdrop-filter:blur(8px);border-radius:10px;width:100%;margin-bottom:6px;border:1px solid var(--border);transition:all .15s}
.lb-item:hover{background:rgba(255,255,255,.06)}
.lb-item.me{border-color:var(--primary);background:rgba(99,102,241,.06)}
.lb-rank{display:flex;align-items:center;gap:6px}
.lb-rank span{font-weight:600;font-size:14px}
.lb-score{color:var(--success);font-weight:700;font-size:15px}

/* ─── Animations ─── */
@keyframes barGrow{from{width:0!important}}
.bar-anim .histogram-bar-fill{animation:barGrow .6s ease}
</style>
</head>
<body>
<div class="player-app" id="app">

<div id="joinScreen" class="screen active">
<div class="card">
<div class="join-logo">🦉</div>
<h2>ИльЯкласс</h2>
<p class="join-sub">Введи никнейм, чтобы присоединиться</p>
<div class="input-group"><label>Никнейм</label><input type="text" id="nameInput" maxlength="20" placeholder="Ученик..." autocomplete="off"></div>
<div id="joinError" class="error"></div>
<button class="btn btn-primary" id="joinBtn">Присоединиться</button>
</div>
</div>

<div id="waitingScreen" class="screen">
<div class="card" style="gap:20px;padding:32px 24px">
<div class="spinner"></div>
<h2>Ожидание...</h2>
<p class="lobby-waiting" id="waitingHint">Подключаемся к серверу...</p>
<div id="lobbyInfo" style="display:none;flex-direction:column;align-items:center;gap:12px;width:100%">
<div style="width:100%;height:1px;background:var(--border)"></div>
<p class="lobby-label">В лобби</p>
<p class="lobby-count" id="lobbyCount">0</p>
<p class="lobby-players" id="lobbyPlayersList"></p>
</div>
</div>
</div>

<div id="countdownScreen" class="screen">
<div class="card" style="gap:24px;padding:40px 24px">
<div class="countdown-number" id="countdownNumber">3</div>
<h2>Приготовьтесь!</h2>
</div>
</div>

<div id="questionScreen" class="screen">
<div class="card" style="gap:12px;padding:22px 20px">
<p class="q-progress" id="qProgress">Вопрос 1 / 5</p>
<h2 class="q-text" id="qText"></h2>
<div class="answers-grid" id="answersContainer"></div>
</div>
</div>

<div id="testScreen" class="screen">
<div class="card" style="gap:14px;padding:18px 16px;max-width:100%">
<div style="display:flex;align-items:center;justify-content:space-between;width:100%">
<p class="q-progress" id="testProgress">1 / 5</p>
<div id="testTimer" style="font-size:13px;font-weight:700;color:var(--primary);font-variant-numeric:tabular-nums">⏱ 5:00</div>
</div>
<div class="timer-bar"><div class="timer-fill" id="testTimerFill" style="width:100%"></div></div>
<h2 class="q-text" id="testQText" style="font-size:17px;min-height:40px"></h2>
<div class="answers-grid" id="testAnswersContainer"></div>
<div style="display:flex;gap:8px;width:100%;margin-top:4px">
<button class="btn btn-secondary" id="testPrevBtn" style="flex:1">◀ Назад</button>
<button class="btn btn-secondary" id="testNextBtn" style="flex:1">Далее ▶</button>
</div>
<button class="btn btn-primary" id="testSubmitBtn" style="display:none">📤 Отправить ответы</button>
</div>
</div>

<div id="roundResultsScreen" class="screen">
<div class="card" style="gap:16px;padding:22px 20px">
<div class="round-results-title" id="roundResultsTitle">⏳ Ждём ответы...</div>
<div id="roundHistogram" style="width:100%"></div>
</div>
</div>

<div id="completeScreen" class="screen">
<div class="card" style="gap:16px;padding:36px 24px">
<div class="complete-icon">🎉</div>
<h2>Проверочная работа завершена!</h2>
<p>Твой результат</p>
<div class="complete-score" id="completeScore">0</div>
<p class="pulse" style="font-size:13px;color:var(--text-secondary)">Ожидаем остальных...</p>
</div>
</div>

<div id="finalScreen" class="screen">
<div class="card" style="gap:16px;padding:24px 20px">
<h2>🏆 Итоги</h2>
<div id="finalLeaderboard" style="width:100%;margin-top:4px"></div>
<p style="margin-top:4px;font-size:13px;color:var(--text-secondary)">Можно закрыть страницу</p>
</div>
</div>

</div>
<script>
// ─── Style & dark from URL ───
(function(){const s=new URLSearchParams(window.location.search).get('style');if(s&&s.trim())document.body.className='style-'+s.trim();if(new URLSearchParams(window.location.search).get('dark')==='1')document.body.classList.add('dark')})();

let ws=null,playerId='',nickname='',currentPin='';
const urlPin=(new URLSearchParams(window.location.search).get('pin')||'').trim();
let connTimeout=null;

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));const el=document.getElementById(id);if(el)el.classList.add('active')}
function showErr(msg){const e=document.getElementById('joinError');e.textContent=msg;e.classList.add('show')}
function hideErr(){document.getElementById('joinError').classList.remove('show')}

function joinGame(){
const name=document.getElementById('nameInput').value.trim();
hideErr();
if(!name){showErr('Введи никнейм');return}
if(!urlPin||urlPin.length!==6){showErr('Неверный PIN в ссылке');return}
nickname=name;currentPin=urlPin;
const host=window.location.host;
if(!host){showErr('Ошибка адреса страницы');return}
show('waitingScreen');
document.getElementById('waitingHint').textContent='Подключаемся к серверу...';
if(ws){try{ws.close()}catch(e){}}
ws=new WebSocket('ws://'+host+'/ws');
connTimeout=setTimeout(()=>{
if(ws&&ws.readyState!==WebSocket.OPEN){
ws.close();show('joinScreen');showErr('Сервер не отвечает. Проверьте подключение к Wi-Fi')
}},8000);
ws.onopen=()=>{if(connTimeout){clearTimeout(connTimeout);connTimeout=null}document.getElementById('waitingHint').textContent='Вход в лобби...';ws.send(JSON.stringify({type:'join',pin:urlPin,nickname:name}))};
ws.onmessage=e=>{try{handle(JSON.parse(e.data))}catch(ex){console.error('WS msg error:',ex)}};
ws.onerror=()=>{if(connTimeout){clearTimeout(connTimeout);connTimeout=null}show('joinScreen');showErr('Ошибка подключения к серверу')};
ws.onclose=()=>{if(connTimeout){clearTimeout(connTimeout);connTimeout=null}if(!document.getElementById('joinScreen').classList.contains('active')){show('joinScreen');showErr('Соединение потеряно')}};
}

function handle(msg){
switch(msg.type){
case'lobby_joined':{playerId=msg.player_id;document.getElementById('waitingHint').textContent='Учитель скоро начнёт игру';const li=document.getElementById('lobbyInfo');li.style.display='flex';const cnt=document.getElementById('lobbyCount');const lst=document.getElementById('lobbyPlayersList');if(msg.players){cnt.textContent=msg.players.length;const others=msg.players.filter(p=>p.id!==playerId);lst.innerHTML=others.length?'🎮 '+others.map(p=>p.nickname).join(', '):'Вы первый!'};break}
case'lobby_error':show('joinScreen');showErr(msg.error);try{ws.close()}catch(e){}break;
case'game_starting':showCountdown(msg);break;
case'question':showQuestion(msg);break;
case'answer_result':showResult(msg);break;
case'round_results':showRoundResults(msg);break;
case'test_start':showTestStart(msg);break;
case'test_complete':showComplete(msg);break;
case'final_results':showFinal(msg);break;
case'style_update':{document.body.className='style-'+msg.style;if(msg.dark)document.body.classList.add('dark');else document.body.classList.remove('dark');break}
}
}

let countdownTimer=null,timerInterval=null;

function showCountdown(msg){
let n=msg.countdown||3;
const el=document.getElementById('countdownNumber');
const animate=()=>{el.textContent=n;el.style.animation='none';void el.offsetWidth;el.style.animation='countPulse .6s ease'};
animate();
if(countdownTimer)clearInterval(countdownTimer);
countdownTimer=setInterval(()=>{n--;if(n>0){animate()}else{clearInterval(countdownTimer);countdownTimer=null;show('questionScreen')}},1000);
show('countdownScreen');
}

const ANS_COLORS=['#FF4444','#4488FF','#FFBB33','#44CC44'];
const ANS_SHAPES=['△','◇','○','☆'];

function showRoundResults(msg){
show('roundResultsScreen');
const title=document.getElementById('roundResultsTitle');
const cont=document.getElementById('roundHistogram');cont.innerHTML='';
const total=(msg.histogram||[]).reduce((a,b)=>a+b,0);
const max=Math.max(...(msg.histogram||[1]),1);
title.textContent='✅ Результаты раунда — '+total+' ответов';
if(msg.histogram){
const barsDiv=document.createElement('div');barsDiv.style.cssText='width:100%;display:flex;flex-direction:column;gap:8px';
msg.histogram.forEach((count,i)=>{
const isCorrect=i===msg.correct_index;
const pct=total>0?Math.round(count/total*100):0;
const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px';
const lbl=document.createElement('div');lbl.style.cssText='font-size:12px;color:var(--text-secondary);min-width:70px';
lbl.innerHTML=(isCorrect?'✅ ':'')+ANS_SHAPES[i]+' В.'+(i+1);
const track=document.createElement('div');track.className='histogram-bar-track';
const fill=document.createElement('div');fill.className='histogram-bar-fill';
fill.style.width=(count/max*100)+'%';
fill.style.background=isCorrect?'var(--success)':ANS_COLORS[i];
track.appendChild(fill);row.appendChild(lbl);row.appendChild(track);
const stat=document.createElement('span');stat.style.cssText='font-size:13px;font-weight:700;color:'+(isCorrect?'var(--success)':'var(--text)')+';min-width:50px;text-align:right';
stat.textContent=count+' ('+pct+'%)';
row.appendChild(stat);barsDiv.appendChild(row)});cont.appendChild(barsDiv);
cont.classList.add('bar-anim')}
if(msg.leaderboard&&msg.leaderboard.length){
const div=document.createElement('div');div.style.cssText='margin-top:16px;width:100%';
const h=document.createElement('h3');h.style.cssText='font-size:15px;font-weight:700;margin-bottom:10px';h.textContent='🏆 Таблица';div.appendChild(h);
msg.leaderboard.forEach((p,idx)=>{
const d=document.createElement('div');d.className='lb-item'+(p.id===playerId?' me':'');
d.innerHTML='<div class="lb-rank">'+(idx<3?['🥇','🥈','🥉'][idx]:'#'+p.rank)+' <span>'+p.nickname+'</span></div><span class="lb-score">'+p.total_score+' б</span>';
div.appendChild(d)});cont.appendChild(div)}
}

function showQuestion(msg){
show('questionScreen');
if(timerInterval)clearInterval(timerInterval);
document.getElementById('qProgress').textContent='Вопрос '+(msg.index+1)+' / '+msg.total;
document.getElementById('qText').textContent=msg.question.text;
const cont=document.getElementById('answersContainer');cont.innerHTML='';
msg.question.answers.forEach((a,i)=>{const b=document.createElement('button');b.className='answer-btn';b.style.backgroundColor=ANS_COLORS[i];b.innerHTML='<span class="shape">'+ANS_SHAPES[i]+'</span><span class="text">'+a.text+'</span>';b.onclick=()=>submitAnswer(i);b.id='ans-'+i;cont.appendChild(b)});
const sec=msg.question.time_seconds;
if(sec&&sec>0){
let remain=sec;
let tb=document.getElementById('timerBar');
if(!tb){tb=document.createElement('div');tb.className='timer-bar';tb.id='timerBar';tb.innerHTML='<div class="timer-fill" id="timerFill" style="width:100%"></div>';document.getElementById('questionScreen').querySelector('.card').insertBefore(tb,document.getElementById('qProgress').nextSibling)}
document.getElementById('timerFill').style.width='100%';
const update=()=>{remain=Math.max(0,remain-1);const f=document.getElementById('timerFill');if(f)f.style.width=(remain/sec*100)+'%';if(remain<=0)clearInterval(timerInterval)};
timerInterval=setInterval(update,1000)
}
}

let testQuestions=[],testAnswers=[],testCurrent=0,testTimerRemain=0,testTimerTotal=0,testTimerInterval=null;

function showTestStart(msg){
testQuestions=msg.questions||[];
testAnswers=new Array(testQuestions.length).fill(-1);
testCurrent=0;
testTimerRemain=msg.total_time_seconds||0;
testTimerTotal=testTimerRemain;
show('testScreen');
if(testTimerInterval)clearInterval(testTimerInterval);
renderTestQuestion();
updateTestTimer();
if(testTimerRemain>0){
testTimerInterval=setInterval(()=>{
testTimerRemain=Math.max(0,testTimerRemain-1);
updateTestTimer();
if(testTimerRemain<=0){
clearInterval(testTimerInterval);
testTimerInterval=null;
submitTestAnswers();
}
},1000)
}
}

function updateTestTimer(){
const el=document.getElementById('testTimer');
const fill=document.getElementById('testTimerFill');
if(testTimerTotal>0){
const pct=testTimerRemain/testTimerTotal*100;
if(fill)fill.style.width=Math.max(0,pct)+'%';
}
if(el){
const m=Math.floor(testTimerRemain/60);
const s=testTimerRemain%60;
el.textContent='⏱ '+m+':'+String(s).padStart(2,'0')
}
}

function renderTestQuestion(){
if(testQuestions.length===0)return;
const q=testQuestions[testCurrent];
document.getElementById('testProgress').textContent='Вопрос '+(testCurrent+1)+' / '+testQuestions.length;
document.getElementById('testQText').textContent=q.text;
const cont=document.getElementById('testAnswersContainer');cont.innerHTML='';
q.answers.forEach((a,i)=>{
const b=document.createElement('button');b.className='answer-btn';
b.style.backgroundColor=ANS_COLORS[i];
const selected=testAnswers[testCurrent]===i;
if(selected){b.style.boxShadow='0 0 0 3px var(--success),0 0 20px var(--success-glow)'}
b.innerHTML='<span class="shape">'+ANS_SHAPES[i]+'</span><span class="text">'+a.text+'</span>';
b.onclick=()=>{testAnswers[testCurrent]=i;renderTestQuestion()};
b.id='test-ans-'+i;cont.appendChild(b)
});
document.getElementById('testPrevBtn').style.display=testCurrent>0?'':'none';
document.getElementById('testNextBtn').style.display=testCurrent<testQuestions.length-1?'':'none';
document.getElementById('testSubmitBtn').style.display=testCurrent===testQuestions.length-1?'':'none';
const allAnswered=testAnswers.every(a=>a!==-1);
if(allAnswered&&testCurrent===testQuestions.length-1){
document.getElementById('testSubmitBtn').style.display=''
}
}

function showResult(msg){
show('resultScreen');
if(msg.correct){document.getElementById('resultIcon').textContent='✅';document.getElementById('resultTitle').textContent='Правильно!';document.getElementById('resultPoints').className='result-points'}
else{document.getElementById('resultIcon').textContent='❌';document.getElementById('resultTitle').textContent='Неправильно';document.getElementById('resultPoints').className='result-points wrong'}
document.getElementById('resultPoints').textContent='+'+msg.points;
const nb=document.getElementById('nextBtn');
if(msg.show_next){nb.style.display='';nb.onclick=()=>{if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'next_question',pin:currentPin}))}}
else{nb.style.display='none'}
}

function showComplete(msg){show('completeScreen');document.getElementById('completeScore').textContent=msg.score+' баллов'}

function submitTestAnswers(){
if(testTimerInterval){clearInterval(testTimerInterval);testTimerInterval=null}
const answers=testAnswers.map((ans,i)=>({question_index:i,answer_index:ans})).filter(a=>a.answer_index!==-1);
if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'submit_test',pin:currentPin,answers}));
else show('joinScreen'),showErr('Нет соединения с сервером')
}
function showFinal(msg){
show('finalScreen');
const lb=msg.leaderboard||[];
const c=document.getElementById('finalLeaderboard');c.innerHTML='';
lb.forEach(p=>{const d=document.createElement('div');d.className='lb-item'+(p.id===playerId?' me':'');d.innerHTML='<div class="lb-rank"><span>'+p.rank+'. '+p.nickname+'</span></div><span class="lb-score">'+p.total_score+' б</span>';c.appendChild(d)})
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('joinScreen').classList.contains('active')&&!document.getElementById('joinBtn').disabled)joinGame()});
document.getElementById('joinBtn').addEventListener('click',joinGame);
document.getElementById('nameInput').focus();
document.getElementById('testPrevBtn').addEventListener('click',()=>{if(testCurrent>0){testCurrent--;renderTestQuestion()}});
document.getElementById('testNextBtn').addEventListener('click',()=>{if(testCurrent<testQuestions.length-1){testCurrent++;renderTestQuestion()}});
document.getElementById('testSubmitBtn').addEventListener('click',submitTestAnswers);
</script>
</body>
</html>
