<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ИльЯкласс — дев-сборка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo svg { width: 32px; height: 32px; }
    .subtitle {
      font-size: 0.95rem;
      opacity: 0.6;
      font-weight: 400;
      margin-bottom: 40px;
    }
    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px 36px;
      width: 280px;
      text-align: center;
      transition: transform 0.2s, background 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.12);
    }
    .card .icon {
      font-size: 2.8rem;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card p {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .card .size {
      font-size: 0.75rem;
      opacity: 0.4;
      margin-bottom: 12px;
    }
    .btn {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 10px;
      background: #6c5ce7;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #7c6cf7; }
    .footer {
      margin-top: 48px;
      font-size: 0.8rem;
      opacity: 0.35;
    }
    .footer a { color: #6c5ce7; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      background: rgba(108,92,231,0.3);
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    ИльЯкласс
  </div>
  <div class="subtitle">Предрелизная сборка · v0.6.8</div>

  <div class="cards">
    <div class="card">
      <div class="icon">📦</div>
      <div class="badge">portable</div>
      <h2>Портативная версия</h2>
      <p>Не требует установки. Распаковал — запустил.</p>
      <div class="size">~10 МБ</div>
      <a class="btn" href="./ilya-klass.exe" download>Скачать .exe</a>
    </div>
    <div class="card">
      <div class="icon">⚙️</div>
      <div class="badge">installer</div>
      <h2>Установщик</h2>
      <p>NSIS-установщик. Добавит ярлык в меню Пуск.</p>
      <div class="size">~1.5 МБ</div>
      <a class="btn" href="./IlyaKlass_0.6.8_x64-setup.exe" download>Скачать .exe</a>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/IlyaSigma111/quizkit">GitHub</a> · <a href="https://ilyasigma111.github.io/quizkit/">основная версия</a>
  </div>
</body>
</html>
