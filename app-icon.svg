<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#4a2fb5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <g transform="translate(512,480)">
    <!-- body -->
    <ellipse cx="0" cy="60" rx="160" ry="140" fill="#1a1a2e"/>
    <!-- head -->
    <circle cx="0" cy="-60" r="110" fill="#1a1a2e"/>
    <!-- eyes -->
    <ellipse cx="-45" cy="-70" rx="35" ry="40" fill="#e8e8f0"/>
    <ellipse cx="45" cy="-70" rx="35" ry="40" fill="#e8e8f0"/>
    <circle cx="-45" cy="-70" r="18" fill="#7c5cfc"/>
    <circle cx="45" cy="-70" r="18" fill="#7c5cfc"/>
    <circle cx="-40" cy="-75" r="6" fill="#fff"/>
    <circle cx="50" cy="-75" r="6" fill="#fff"/>
    <!-- beak -->
    <polygon points="0,-35 -15,-10 15,-10" fill="#f59e0b"/>
    <!-- ear tufts -->
    <polygon points="-90,-100 -70,-130 -50,-95" fill="#1a1a2e"/>
    <polygon points="90,-100 70,-130 50,-95" fill="#1a1a2e"/>
    <!-- wings -->
    <path d="M-150,40 Q-200,100 -140,160 Q-100,180 -80,140" fill="#1a1a2e" stroke="#7c5cfc" stroke-width="4"/>
    <path d="M150,40 Q200,100 140,160 Q100,180 80,140" fill="#1a1a2e" stroke="#7c5cfc" stroke-width="4"/>
    <!-- feet -->
    <rect x="-50" y="195" width="30" height="15" rx="5" fill="#f59e0b"/>
    <rect x="20" y="195" width="30" height="15" rx="5" fill="#f59e0b"/>
    <!-- belly pattern -->
    <ellipse cx="0" cy="60" rx="80" ry="70" fill="none" stroke="#7c5cfc" stroke-width="3" opacity=".3"/>
    <!-- book -->
    <rect x="-35" y="30" width="70" height="50" rx="4" fill="#7c5cfc" opacity=".4"/>
    <line x1="0" y1="30" x2="0" y2="80" stroke="#7c5cfc" stroke-width="2" opacity=".6"/>
  </g>
</svg>
